name: Build Gallery

# 이미지 파일이 push될 때만 실행 (gallery.json 변경은 무시 → 무한루프 방지)
on:
  push:
    branches: [main]
    paths:
      - 'images/*.jpg'
      - 'images/*.jpeg'
      - 'images/*.png'
      - 'images/*.webp'
      - 'images/*.gif'
      - 'images/*.svg'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gallery.json 커밋 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pillow 설치 (이미지 크기 읽기용)
        run: pip install Pillow

      - name: gallery.json 재생성
        run: python generate_gallery.py --no-serve

      - name: gallery.json 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/gallery.json
          git diff --staged --quiet || git commit -m "auto: gallery.json 업데이트"
          git push
