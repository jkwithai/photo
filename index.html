<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✏️ 수정 1: 브라우저 탭에 표시될 이름 -->
  <title>아이유 | 포트폴리오</title>

  <meta name="description" content="사진 포트폴리오">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====================================================
       헤더: 이름 + 한 줄 소개
       ==================================================== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-text">
        <!-- ✏️ 수정 2: 내 이름으로 바꾸세요 -->
        <h1 class="site-name">아이유</h1>
        <!-- ✏️ 수정 3: 내 한 줄 소개로 바꾸세요 -->
        <p class="site-tagline">빛과 순간을 기록합니다</p>
      </div>
      <button class="dark-mode-toggle" id="darkModeToggle" aria-label="다크모드 전환">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ====================================================
       카테고리 필터 버튼
       ==================================================== -->
  <nav class="category-nav" aria-label="카테고리 필터">
    <div class="nav-inner">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="portrait">인물</button>
      <button class="filter-btn" data-filter="landscape">풍경</button>
      <button class="filter-btn" data-filter="work">작업물</button>
    </div>
  </nav>

  <!-- ====================================================
       갤러리 그리드 (JavaScript가 사진을 채웁니다)
       ==================================================== -->
  <main class="gallery-section">
    <div class="gallery-grid" id="galleryGrid">
      <div class="gallery-loading">
        <div class="loading-spinner"></div>
        <p>갤러리 불러오는 중…</p>
      </div>
    </div>
  </main>

  <!-- ====================================================
       About 섹션
       ==================================================== -->
  <section class="about-section" id="about">
    <div class="section-inner">
      <h2 class="section-title">About</h2>
      <div class="about-body">
        <!-- ✏️ 수정 4: 자기소개를 여기에 쓰세요 -->
        <p>안녕하세요. 저는 일상의 순간 속에서 특별한 빛을 찾는 사진작가입니다.</p>
        <p>인물, 풍경, 그리고 삶의 작은 디테일들을 렌즈에 담아냅니다. 서울을 기반으로 활동하고 있으며, 작업 문의는 언제든지 환영합니다.</p>
      </div>
    </div>
  </section>

  <!-- ====================================================
       Contact 섹션
       ==================================================== -->
  <section class="contact-section" id="contact">
    <div class="section-inner">
      <h2 class="section-title">Contact</h2>
      <p class="contact-desc">작업 문의 및 협업 제안은 언제든지 환영합니다.</p>
      <ul class="contact-links">
        <!-- ✏️ 수정 5: 내 이메일 주소로 바꾸세요 -->
        <li>
          <a href="mailto:your@email.com" class="contact-link">
            <span class="contact-label">Email</span>
            <span class="contact-value">your@email.com</span>
          </a>
        </li>
        <!-- ✏️ 수정 6: 내 Instagram 아이디로 바꾸세요 (없으면 이 li 태그 삭제) -->
        <li>
          <a href="https://instagram.com/yourid" class="contact-link" target="_blank" rel="noopener noreferrer">
            <span class="contact-label">Instagram</span>
            <span class="contact-value">@yourid</span>
          </a>
        </li>
        <!-- ✏️ 수정 7: 필요 없는 SNS는 li 태그째로 삭제하세요 -->
        <li>
          <a href="https://github.com/yourid" class="contact-link" target="_blank" rel="noopener noreferrer">
            <span class="contact-label">GitHub</span>
            <span class="contact-value">yourid</span>
          </a>
        </li>
      </ul>
    </div>
  </section>

  <!-- ====================================================
       푸터
       ==================================================== -->
  <footer class="site-footer">
    <!-- ✏️ 수정 8: 내 이름으로 바꾸세요 -->
    <p>&copy; 2024 Your Name. All rights reserved.</p>
  </footer>

  <!-- ====================================================
       라이트박스 (사진 크게 보기)
       ==================================================== -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="사진 크게 보기">
    <div class="lightbox-bg" id="lightboxBg"></div>
    <button class="lightbox-close" id="lightboxClose" aria-label="닫기">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="이전 사진">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="다음 사진">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="lightbox-stage">
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
      <div class="lightbox-meta">
        <span class="lightbox-title" id="lightboxTitle"></span>
        <span class="lightbox-counter" id="lightboxCounter"></span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
